services:
  postgres:
    image: postgres:16-alpine
    container_name: sweater-db
    environment:
      POSTGRES_DB: sweater
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sweater-net

  backend:
    image: ghcr.io/${GHCR_OWNER}/sweater-backend:latest
    container_name: sweater-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      - DB_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/sweater
    networks:
      - sweater-net

  frontend:
    image: ghcr.io/${GHCR_OWNER}/sweater-frontend:latest
    container_name: sweater-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - sweater-net

volumes:
  postgres_data:

networks:
  sweater-net:
    driver: bridge
