version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sweater-db
    environment:
      POSTGRES_DB: sweater
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sweater-net

  backend:
      build:
        context: .
        dockerfile: Dockerfile.backend
      container_name: sweater-backend
      restart: unless-stopped
      depends_on:
        - postgres
      environment:
        - DB_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/sweater
      networks:
        - sweater-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sweater-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - sweater-net

volumes:
  postgres_data:

networks:
  sweater-net:
    driver: bridge
