<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 360px;
        }
        h2 { text-align: center; margin-bottom: 24px; color: #333; }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: #667eea; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.02); }
        .link { text-align: center; margin-top: 16px; }
        .link a { color: #667eea; text-decoration: none; }
        .msg {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 12px;
            text-align: center;
        }
        .error { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        .success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Вход</h2>
        <div id="msg"></div>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
        </form>
        <div class="link">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></div>
    </div>
    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                    credentials: 'include'
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('msg').innerHTML = '<div class="success">Успех! Добро пожаловать, ' + data.name + '!</div>';
                    setTimeout(() => window.location.href = '/profile.html', 1500);
                } else {
                    document.getElementById('msg').innerHTML = '<div class="error">' + (data.error || 'Ошибка входа') + '</div>';
                }
            } catch (err) {
                document.getElementById('msg').innerHTML = '<div class="error">Ошибка соединения с сервером</div>';
            }
        };
    </script>
</body>
</html>
